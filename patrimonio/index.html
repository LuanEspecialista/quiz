<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#050505;
  color:white;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

.hero{
  min-height:100vh;
  background:
    linear-gradient(to bottom,rgba(0,0,0,.62),rgba(0,0,0,.82)),
    url('./imagens/hero-bg.webp');
  background-size:cover;
  background-position:center;
  padding:22px 24px 34px;
}

.container{
  width:100%;
  max-width:1180px;
  margin:auto;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:42px;
}

.logo{width:58px}

.top-btn{
  border:1px solid rgba(255,215,120,.35);
  padding:11px 22px;
  border-radius:999px;
  text-decoration:none;
  color:#f3d28a;
  font-size:13px;
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(12px);
}

.hero-content{
  text-align:center;
  max-width:850px;
  margin:auto;
}

h1{
  font-family:'Cormorant Garamond',serif;
  font-size:70px;
  font-weight:500;
  line-height:.95;
  margin-bottom:16px;
  letter-spacing:1px;
}

.gold{color:#d7ab63}

.subtitle{
  font-size:17px;
  color:rgba(255,255,255,.82);
  margin-bottom:14px;
}

.description{
  max-width:650px;
  margin:auto;
  line-height:1.5;
  color:rgba(255,255,255,.68);
  margin-bottom:26px;
  font-size:14px;
}

.flags{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:14px;
  margin-bottom:44px;
}

.flag{
  width:56px;
  height:56px;
  border-radius:16px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(12px);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.3s;
}

.flag:hover{
  transform:translateY(-3px);
  background:rgba(255,255,255,.13);
}

.flag img{
  width:32px;
  height:32px;
  border-radius:50%;
  object-fit:cover;
}

.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card{
  min-height:310px;
  border-radius:24px;
  overflow:hidden;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:26px;
  background-size:cover;
  background-position:center;
  isolation:isolate;
}

.card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.25),rgba(0,0,0,.05));
  z-index:-1;
}

.card-content h2{
  font-family:'Cormorant Garamond',serif;
  font-size:34px;
  line-height:1;
  margin-bottom:12px;
}

.card-content p{
  color:rgba(255,255,255,.76);
  line-height:1.5;
  margin-bottom:20px;
  max-width:300px;
  font-size:14px;
}

.card-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:12px 22px;
  border-radius:999px;
  text-decoration:none;
  color:#f2d18b;
  border:1px solid rgba(255,215,120,.3);
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(10px);
  font-size:13px;
}

.estrategias{background-image:url('./imagens/estrategias.webp')}
.mobilidade{background-image:url('./imagens/mobilidade.webp')}
.imoveis{background-image:url('./imagens/imoveis.webp')}

@media(max-width:900px){
  .hero{padding:24px 18px 50px}
  .top{margin-bottom:42px}
  .logo{width:54px}
  .top-btn{display:none}

  h1{font-size:48px}
  .subtitle{font-size:16px}
  .description{font-size:14px;margin-bottom:28px}

  .flags{
    gap:10px;
    margin-bottom:38px;
  }

  .flag{
    width:54px;
    height:54px;
    border-radius:15px;
  }

  .flag img{
    width:31px;
    height:31px;
  }

  .cards{
    grid-template-columns:1fr;
    gap:18px;
  }

  .card{
    min-height:270px;
    padding:24px;
    border-radius:22px;
  }

  .card-content h2{
    font-size:31px;
  }
}

@media(max-width:480px){
  h1{font-size:42px}
  .hero{padding:20px 14px 42px}
  .card{min-height:250px}
}
</style>
