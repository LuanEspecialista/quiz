<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <!-- SEU CSS ORIGINAL -->
  <style>
    :root {
      --bg: #070709;
      --panel: rgba(11,11,14,0.96);
      --gold: #d4af37;
      --gold-2: #f3e5ab;
      --text: #ffffff;
      --muted: #b8c0c8;
      --border: rgba(212,175,55,0.18);
      --border-soft: rgba(255,255,255,0.08);
      --danger: #ff6b6b;
      --shadow: 0 18px 45px rgba(0,0,0,0.42);
      --radius-xl: 22px;
      --radius-lg: 15px;
      --transition: 0.28s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Montserrat", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 900;
    }

    .btn-primary {
      margin-top: 20px;
      padding: 15px 30px;
      border-radius: 50px;
      background: var(--gold);
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .quiz-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .quiz-overlay.active {
      display: flex;
    }

    .quiz-container {
      background: #111;
      padding: 20px;
      border-radius: 20px;
      max-width: 500px;
      width: 100%;
    }

    .option-btn {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #222;
      color: #fff;
    }
  </style>
</head>

<body>

  <div class="hero">
    <div>
      <h1>Você trabalha muito mas sente que poderia ganhar mais?</h1>
      <button class="btn-primary" onclick="openQuiz()">Ver diagnóstico</button>
    </div>
  </div>

  <div class="quiz-overlay" id="quiz">
    <div class="quiz-container">
      <h2>Qual seu maior problema?</h2>

      <button class="option-btn" onclick="next('Falta de veículo')">Falta de veículo</button>
      <button class="option-btn" onclick="next('Falta de dinheiro')">Falta de dinheiro</button>
      <button class="option-btn" onclick="next('Falta de organização')">Falta de organização</button>

      <div id="form" style="display:none;">
        <input id="nome" placeholder="Seu nome"><br><br>
        <input id="whats" placeholder="WhatsApp"><br><br>
        <button class="btn-primary" onclick="enviar()">Ver resultado</button>
      </div>
    </div>
  </div>

  <script>
    let resposta = "";

    function openQuiz(){
      document.getElementById("quiz").classList.add("active");
      gtag('event', 'quiz_start');
    }

    function next(valor){
      resposta = valor;
      document.getElementById("form").style.display = "block";
    }

    function enviar(){
      const nome = document.getElementById("nome").value;
      const whats = document.getElementById("whats").value;

      if(!nome || !whats){
        alert("Preencha os dados");
        return;
      }

      gtag('event', 'lead');
      fbq('track', 'Lead');

      const msg = `Olá, sou ${nome}. Meu problema é: ${resposta}`;
      window.location.href = `https://wa.me/5547992120915?text=${encodeURIComponent(msg)}`;
    }
  </script>

</body>
</html>
