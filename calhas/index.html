<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet" />

  <!-- META PIXEL -->
  <script>
    !function(f,b,e,v,n,t,s){
      if(f.fbq)return;
      n=f.fbq=function(){n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;
      n.push=n;
      n.loaded=!0;
      n.version='2.0';
      n.queue=[];
      t=b.createElement(e);

      s.parentNode.insertBefore(t,s);
    }(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

  <style>
    body {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      background: #070709;
      color: #fff;
      text-align: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    button {
      background: #d4af37;
      border: none;
      padding: 15px 25px;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Você está deixando dinheiro na mesa?</h1>
  <p>Responda rápido e descubra onde sua empresa está travando.</p>

  <button onclick="startQuiz()">Começar diagnóstico</button>

  <div id="quiz" style="display:none;">
    <p>Qual seu maior problema hoje?</p>

    <button onclick="answer('Falta de veículo')">Falta de veículo</button><br><br>
    <button onclick="answer('Falta de dinheiro')">Falta de dinheiro</button><br><br>
    <button onclick="answer('Falta de organização')">Falta de organização</button>

    <div id="form" style="display:none;">
      <h3>Seu diagnóstico está pronto</h3>
      <input id="nome" placeholder="Seu nome">
      <input id="whatsapp" placeholder="Seu WhatsApp">

      <button onclick="sendLead()">Ver resultado</button>
    </div>
  </div>
</div>

<script>
let resposta = "";

function startQuiz(){
  document.getElementById("quiz").style.display = "block";

  // Evento GA
  gtag('event', 'quiz_start');
}

function answer(valor){
  resposta = valor;
  document.getElementById("form").style.display = "block";
}

function sendLead(){
  const nome = document.getElementById("nome").value;
  const whats = document.getElementById("whatsapp").value;

  if(!nome || !whats){
    alert("Preencha os dados");
    return;
  }

  // Evento GA
  gtag('event', 'lead');

  // Evento Meta
  fbq('track', 'Lead');

  const msg = `Olá, sou ${nome}. Meu problema é: ${resposta}`;
  const url = `https://wa.me/5547992120915?text=${encodeURIComponent(msg)}`;

  window.location.href = url;
}
</script>

</body>
</html>
