<div class="simulator">
  <h2>Quanto você conseguiria investir por mês?</h2>
  <p>Escolha um valor em euro e veja uma estimativa de crédito no Brasil.</p>

  <div class="sim-buttons">
    <button onclick="showResult('300')">€300/mês</button>
    <button onclick="showResult('500')">€500/mês</button>
    <button onclick="showResult('700')">€700/mês</button>
  </div>

  <div id="sim-result" class="sim-result">
    <span>Escolha uma opção acima</span>
  </div>
</div>

<script>
  function showResult(value) {
    const results = {
      300: {
        credit: 'R$ 436 mil',
        text: 'Com €300/mês, você já poderia começar uma estratégia patrimonial no Brasil.'
      },
      500: {
        credit: 'R$ 727 mil',
        text: 'Com €500/mês, você pode mirar uma estratégia próxima de R$ 727 mil em crédito no Brasil.'
      },
      700: {
        credit: 'R$ 1 milhão',
        text: 'Com €700/mês, você pode mirar uma estrutura patrimonial mais robusta no Brasil.'
      }
    };

    const item = results[value];

    document.getElementById('sim-result').innerHTML = `
      <small>Estimativa aproximada</small>
      <strong>${item.credit}</strong>
      <p>${item.text}</p>
      <a href="https://wa.me/5547992120915?text=Ol%C3%A1%2C%20quero%20simular%20uma%20estrat%C3%A9gia%20investindo%20%E2%82%AC${value}%20por%20m%C3%AAs." target="_blank">
        Simular meu perfil no WhatsApp
      </a>
    `;
  }
</script>
