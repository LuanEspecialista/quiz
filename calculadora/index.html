<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultoria Patrimonial Luan - Sistema Integrado</title>
    <style>
        :root {
            --primary: #0a0e14; --card-bg: #161b22; --accent: #c5a059;
            --text: #e6edf3; --success: #2ea043; --danger: #f85149;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--primary); color: var(--text); margin: 0; padding: 20px; }
        .wrapper { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        
        .main-panel, .side-panel { background: var(--card-bg); border-radius: 15px; padding: 25px; border: 1px solid #30363d; min-height: 620px; }
        
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; background: #0d1117; padding: 8px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; background: transparent; color: #8b949e; font-weight: bold; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: var(--primary); box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3); }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; color: var(--accent); font-weight: bold; margin-bottom: 6px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: white; font-size: 16px; box-sizing: border-box; }

        .btn-action { width: 100%; padding: 18px; background: var(--accent); color: var(--primary); border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        .res-container { margin-top: 25px; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 20px; border-left: 5px solid var(--accent); }
        .res-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #30363d; font-size: 15px; }
        .val-highlight { color: var(--success); font-weight: 800; font-size: 19px; }

        .side-title { color: var(--accent); font-size: 14px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
        .info-card { background: #0d1117; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; line-height: 1.6; }
        .badge { display: inline-block; padding: 3px 8px; background: var(--accent); color: var(--primary); border-radius: 4px; font-size: 10px; font-weight: bold; margin-bottom: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="main-panel">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="setTab('tab-imovel', this)">🏠 Imóvel</button>
            <button class="tab-btn" onclick="setTab('tab-veiculo', this)">🚗 Veículo</button>
            <button class="tab-btn" onclick="setTab('tab-investor', this)">👑 Investidor</button>
        </div>

        <div id="tab-imovel" class="section active">
            <div class="input-group">
                <label>Valor do Imóvel / Crédito</label>
                <input type="text" class="money" id="vI" placeholder="R$ 0,00" oninput="autoCalculoEntrada(this, 'eI')">
            </div>
            <div class="input-group">
                <label>Entrada (20% Sugerida Banco)</label>
                <input type="text" class="money" id="eI" placeholder="R$ 0,00">
            </div>
            <div class="input-group">
                <label>Prazo Financiamento</label>
                <select id="pI">
                    <option value="420">420 meses (35 anos)</option>
                    <option value="360" selected>360 meses (30 anos)</option>
                    <option value="240">240 meses (20 anos)</option>
                </select>
            </div>
            <button class="btn-action" onclick="calcImovel()">Analisar Cronograma Banco</button>
        </div>

        <div id="tab-veiculo" class="section">
            <div class="input-group">
                <label>Valor do Veículo</label>
                <input type="text" class="money" id="vV" placeholder="R$ 0,00" oninput="autoCalculoEntrada(this, 'eV')">
            </div>
            <div class="input-group">
                <label>Entrada (20% Sugerida Banco)</label>
                <input type="text" class="money" id="eV" placeholder="R$ 0,00">
            </div>
            <div class="input-group">
                <label>Prazo</label>
                <select id="pV">
                    <option value="60">60 meses (5 anos)</option>
                    <option value="48">48 meses (4 anos)</option>
                    <option value="36">36 meses (3 anos)</option>
                </select>
            </div>
            <button class="btn-action" onclick="calcVeiculo()">Analisar Financiamento</button>
        </div>

        <div id="tab-investor" class="section">
            <div class="input-group">
                <label>Capital para Investir</label>
                <input type="text" class="money" id="capInv" placeholder="R$ 100.000,00">
            </div>
            <div class="input-group">
                <label>Parcela de Crédito</label>
                <input type="text" class="money" id="parcCred" placeholder="R$ 1.500,00">
            </div>
            <div class="input-group">
                <label>Estratégia de Alocação</label>
                <select id="selAtivo" onchange="atualizarTextoLateral()">
                    <option value="0.01|0.225|D+1">CDB Curto Prazo (IR 22,5% - Liquidez D+1)</option>
                    <option value="0.011|0.15|D+30">CDB Longo Prazo (IR 15% - Liquidez D+30)</option>
                    <option value="0.0092|0|D+2">FIIs - Fundo Imobiliário (Isento de IR - Liquidez D+2)</option>
                    <option value="0.0105|0.15|D+0">Tesouro Selic (IR Regressivo - Liquidez Diária)</option>
                    <option value="0.0085|0|D+90">LCI / LCA (Isento de IR - Liquidez 90 dias)</option>
                    <option value="0.012|0|D+2">Ações - Dividend Yield (Isento - Renda Variável)</option>
                    <option value="0.032|0.15|D+0">Cripto Staking Stablecoin (Alto Rendimento)</option>
                    <option value="0.005|0|D+0">Poupança (Baixo Rendimento - Isento)</option>
                    <option value="0.0098|0.15|D+1">Fundo Renda Fixa Digital (Praticidade)</option>
                    <option value="0.008|0|D+1">Letra de Câmbio (Isenta - Conservador)</option>
                </select>
            </div>
            <button class="btn-action" style="background:#2ea043; color:white;" onclick="calcAlavancagem()">Gerar Plano Investidor</button>
        </div>

        <div id="resFinal" class="res-container" style="display:none;"></div>
    </div>

    <div class="side-panel">
        <div class="side-title">ANÁLISE ESTRATÉGICA</div>
        <div id="sideContent">
            <div class="info-card">
                <span class="badge">CONSULTORIA MASTER</span><br>
                <p id="txtLateral">O banco exige entrada para mitigar o risco dele. Nossa estratégia usa o seu capital para mitigar o <strong>seu</strong> custo mensal.</p>
            </div>
        </div>
        <div id="impactBox" style="margin-top:20px; padding:15px; border-radius:10px; text-align:center; font-weight:bold; display:none;"></div>
    </div>
</div>

<script>
    function setTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        document.getElementById('resFinal').style.display = 'none';
        document.getElementById('impactBox').style.display = 'none';
    }

    function formatBRL(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function mask(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2) + '';
        v = v.replace(".", ",").replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,").replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = v == '0,00' ? '' : 'R$ ' + v;
    }

    document.querySelectorAll('.money').forEach(el => el.addEventListener('input', () => mask(el)));

    function parse(v) { return parseFloat(v.replace('R$ ', '').replace(/\./g, '').replace(',', '.')) || 0; }

    // CORREÇÃO DO CÁLCULO DE ENTRADA
    function autoCalculoEntrada(i, targetId) {
        const valorBem = parse(i.value);
        if(valorBem > 0) {
            const entradaSugerida = valorBem * 0.20;
            document.getElementById(targetId).value = formatBRL(entradaSugerida);
        }
    }

    function calcImovel() {
        const v = parse(document.getElementById('vI').value);
        const e = parse(document.getElementById('eI').value);
        const n = parseInt(document.getElementById('pI').value);
        const fin = v - e;
        const tx = 0.0087; 
        const p1 = (fin / n) + (fin * tx);
        const pL = (fin / n) + ((fin/n) * tx);
        const juros = (((p1 + pL)/2)*n) - fin;

        showRes(`
            <div class="res-row"><span>1ª Parcela (SAC):</span><strong>${formatBRL(p1)}</strong></div>
            <div class="res-row"><span>Última Parcela:</span><strong>${formatBRL(pL)}</strong></div>
            <div class="res-row" style="color:var(--danger)"><span>Juros Pagos ao Banco:</span><strong>${formatBRL(juros)}</strong></div>
            <div class="res-row" style="border:none"><span>Total Final:</span><strong class="val-highlight">${formatBRL(juros+v)}</strong></div>
        `, `Prejuízo Financeiro: ${formatBRL(juros)} em juros!`, 'var(--danger)');
    }

    function calcVeiculo() {
        const v = parse(document.getElementById('vV').value);
        const e = parse(document.getElementById('eV').value);
        const n = parseInt(document.getElementById('pV').value);
        const fin = v - e;
        const tx = 0.0210; // Taxa média mercado
        const p = fin * (tx * Math.pow(1+tx, n)) / (Math.pow(1+tx, n) - 1);
        const juros = (p * n) - fin;

        showRes(`
            <div class="res-row"><span>Parcela Mensal:</span><strong>${formatBRL(p)}</strong></div>
            <div class="res-row" style="color:var(--danger)"><span>Custo de Juros:</span><strong>${formatBRL(juros)}</strong></div>
            <div class="res-row" style="border:none"><span>Total Pago:</span><strong class="val-highlight">${formatBRL(p*n+e)}</strong></div>
        `, `No banco, o cliente paga quase 2 veículos!`, 'var(--danger)');
    }

    function calcAlavancagem() {
        const cap = parse(document.getElementById('capInv').value);
        const p = parse(document.getElementById('parcCred').value);
        const [tx, ir, liq] = document.getElementById('selAtivo').value.split('|');
        const rb = cap * parseFloat(tx);
        const rl = rb * (1 - parseFloat(ir));
        const cr = p - rl;

        showRes(`
            <div class="res-row"><span>Rendimento Líquido:</span><strong class="val-highlight">${formatBRL(rl)}</strong></div>
            <div class="res-row"><span>Parcela Original:</span><strong>${formatBRL(p)}</strong></div>
            <div class="res-row" style="border-top:2px solid #30363d; margin-top:10px;"><span>Custo de Crédito Real:</span><strong style="color:var(--accent); font-size:22px;">${formatBRL(cr < 0 ? 0 : cr)}</strong></div>
        `, `O rendimento paga ${((rl/p)*100).toFixed(1)}% da sua parcela!`, 'var(--success)');
    }

    function showRes(html, msg, color) {
        const r = document.getElementById('resFinal');
        r.innerHTML = html; r.style.display = 'block';
        const i = document.getElementById('impactBox');
        i.innerText = msg; i.style.background = color + '22'; i.style.color = color; i.style.display = 'block';
    }

    function atualizarTextoLateral() {
        const sel = document.getElementById('selAtivo');
        const labels = {
            "0.0092|0|D+2": "Os Fundos Imobiliários (FIIs) são excelentes para o crédito de imóveis, pois o rendimento é isento de IR e cai todo mês.",
            "0.01|0.225|D+1": "O CDB de curto prazo oferece segurança e liquidez, mas a mordida do IR (22,5%) é maior se sacar antes de 6 meses.",
            "0.032|0.15|D+0": "Staking de dólar digital oferece rendimentos agressivos para investidores que buscam quitar o crédito mais rápido."
        };
        document.getElementById('txtLateral').innerText = labels[sel.value] || "Escolha o melhor ativo para o perfil do seu cliente.";
    }
</script>
</body>
</html>
