<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analise Pro - Luan Especialista</title>
    <style>
        :root { --azul: #005ca9; --vermelho: #e30613; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; color: #333; }
        .container { background: var(--card); width: 100%; max-width: 500px; padding: 20px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        .header { text-align: center; margin-bottom: 20px; border-bottom: 3px solid var(--azul); padding-bottom: 10px; }
        .header h1 { font-size: 20px; color: var(--azul); margin: 0; text-transform: uppercase; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--azul); outline: none; }

        .btn-calc { width: 100%; padding: 16px; border: none; border-radius: 8px; background: var(--azul); color: white; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        
        /* Relatório de Perda */
        .resultado { margin-top: 20px; display: none; }
        .card-perda { background: #fff5f5; border: 2px solid #feb2b2; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .res-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .res-label { font-size: 14px; color: #666; }
        .res-val { font-weight: 700; font-size: 15px; }
        .destaque-vermelho { color: var(--vermelho); font-size: 20px; display: block; text-align: center; margin-top: 5px; }

        /* Comparativo Consórcio */
        .card-consorcio { background: #e6fffa; border: 2px solid #b2f5ea; padding: 15px; border-radius: 10px; }
        .total-banco { background: #333; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-top: 15px; }
        .total-banco span { display: block; font-size: 26px; font-weight: 900; color: #ffcc00; }
        
        .alerta { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Analisador de Crédito Real</h1>
    </div>

    <div id="alerta-entrada" class="alerta"></div>

    <div class="input-group">
        <label>Valor do Imóvel / Crédito</label>
        <input type="text" id="valor" placeholder="R$ 0,00" oninput="autoEntrada(this)">
    </div>

    <div class="input-group">
        <label>Entrada (Mínimo 20% p/ Banco)</label>
        <input type="text" id="entrada" placeholder="R$ 0,00" oninput="maskMoney(this)">
    </div>

    <div class="input-group">
        <label>Prazo do Financiamento</label>
        <select id="prazo">
            <option value="420">420 meses (35 anos)</option>
            <option value="360" selected>360 meses (30 anos)</option>
            <option value="240">240 meses (20 anos)</option>
            <option value="180">180 meses (15 anos)</option>
        </select>
    </div>

    <button class="btn-calc" onclick="gerarAnalise()">Gerar Relatório de Perda Patrimonial</button>

    <div id="resultado" class="resultado">
        <div class="card-perda">
            <div style="text-align:center; font-weight:bold; color:var(--vermelho); margin-bottom:10px;">PROJEÇÃO DE PERDA BANCÁRIA (SAC)</div>
            <div class="res-row"><span class="res-label">1ª Parcela:</span> <span class="res-val" id="p1"></span></div>
            <div class="res-row"><span class="res-label">Amortização Mensal:</span> <span class="res-val" id="amort"></span></div>
            <div class="res-row"><span class="res-label">Última Parcela:</span> <span class="res-val" id="pLast"></span></div>
            <div class="res-row" style="border:none;"><span class="res-label">Total só de Juros (Perda):</span></div>
            <span class="destaque-vermelho" id="jurosTotal"></span>
        </div>

        <div class="card-consorcio">
            <div style="text-align:center; font-weight:bold; color:#2c7a7b; margin-bottom:10px;">OPÇÃO INTELIGENTE (EMBRACON)</div>
            <div class="res-row"><span class="res-label">Parcela Média Estimada:</span> <span class="res-val" id="pCons"></span></div>
            <div class="res-row"><span class="res-label">Economia Gerada:</span> <span class="res-val" style="color:#2f855a;" id="economia"></span></div>
        </div>

        <div class="total-banco">
            <small>DESEMBOLSO TOTAL AO BANCO</small>
            <span id="vTotal">R$ 0,00</span>
        </div>
    </div>
</div>

<script>
    function maskMoney(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2) + '';
        v = v.replace(".", ",");
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = v == '0,00' ? '' : 'R$ ' + v;
    }

    function parseV(v) { return parseFloat(v.replace('R$ ', '').replace(/\./g, '').replace(',', '.')) || 0; }

    function autoEntrada(i) {
        maskMoney(i);
        const vBem = parseV(i.value);
        if (vBem > 0) {
            const vSugerido = vBem * 0.20;
            document.getElementById('entrada').value = "R$ " + vSugerido.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        }
    }

    function gerarAnalise() {
        const vBem = parseV(document.getElementById('valor').value);
        const vEntrada = parseV(document.getElementById('entrada').value);
        const n = parseInt(document.getElementById('prazo').value);
        const alerta = document.getElementById('alerta-entrada');

        if(vEntrada < (vBem * 0.2)) {
            alerta.innerText = "BLOQUEADO: Banco não financia com menos de 20% de entrada (R$ " + (vBem*0.2).toLocaleString('pt-BR',{minimumFractionDigits:2}) + ")";
            alerta.style.display = 'block';
            document.getElementById('resultado').style.display = 'none';
            return;
        }
        alerta.style.display = 'none';

        const financiado = vBem - vEntrada;
        const taxaAnual = 0.099; // Taxa média atual
        const taxaMensal = Math.pow(1 + taxaAnual, 1/12) - 1;

        // SAC
        const amort = financiado / n;
        const p1 = amort + (financiado * taxaMensal);
        const pLast = amort + (amort * taxaMensal);
        const totalPagamentoBancario = ((p1 + pLast) / 2) * n;
        const jurosTotal = totalPagamentoBancario - financiado;
        
        // Dados Embracon baseados nos seus prints (Media 240 meses)
        const taxaAdmTotal = 0.28; 
        const fundoReserva = 0.02;
        const custoTotalConsorcio = vBem * (taxaAdmTotal + fundoReserva);
        const parcelaMediaCons = (vBem + custoTotalConsorcio) / 240;

        document.getElementById('p1').innerText = p1.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        document.getElementById('amort').innerText = amort.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        document.getElementById('pLast').innerText = pLast.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        document.getElementById('jurosTotal').innerText = jurosTotal.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        document.getElementById('pCons').innerText = parcelaMediaCons.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        document.getElementById('vTotal').innerText = (totalPagamentoBancario + vEntrada).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        document.getElementById('economia').innerText = (jurosTotal - custoTotalConsorcio).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        
        document.getElementById('resultado').style.display = 'block';
    }
</script>
</body>
</html>
