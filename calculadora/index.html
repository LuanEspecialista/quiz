<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luan - Consultoria de Crédito Estratégica</title>
    <style>
        :root { --azul-banco: #005ca9; --vermelho-embracon: #e30613; --bg: #f8f9fa; --perigo: #d9534f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: #fff; width: 100%; max-width: 550px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; background: #eee; padding: 5px; border-radius: 10px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; font-weight: bold; border-radius: 8px; color: #666; }
        .tab-btn.active { background: white; color: var(--azul-banco); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .card { border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-top: 20px; display: none; }
        .header-card { text-align: center; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-banco { background: var(--azul-banco); color: white; margin-bottom: 10px; }
        .btn-embracon { background: var(--vermelho-embracon); color: white; }

        .res-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dotted #eee; font-size: 14px; }
        .total-box { background: #333; color: #ffd700; padding: 15px; text-align: center; border-radius: 8px; margin-top: 15px; }
        .total-box small { color: #fff; display: block; font-size: 11px; }
        .total-box span { font-size: 22px; font-weight: bold; }
        
        .destaque-juros { color: var(--perigo); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="show('tab-banco', this)">🏦 Banco (Vilão)</button>
        <button class="tab-btn" onclick="show('tab-embracon', this)">🤝 Embracon (Solução)</button>
    </div>

    <div class="input-group">
        <label>Valor do Crédito/Bem</label>
        <input type="text" id="vGeral" placeholder="R$ 0,00" oninput="mask(this)">
    </div>

    <div id="tab-banco" class="card" style="display: block;">
        <div class="header-card">FINANCIAMENTO BANCÁRIO (SAC)</div>
        <div class="input-group">
            <label>Prazo (Meses)</label>
            <select id="pBanco">
                <option value="420">420 meses (35 anos)</option>
                <option value="360" selected>360 meses (30 anos)</option>
                <option value="180">180 meses (15 anos)</option>
            </select>
        </div>
        <button class="btn-banco" onclick="calcBanco()">Analisar Perda Financeira</button>
        <div id="resBanco"></div>
    </div>

    <div id="tab-embracon" class="card">
        <div class="header-card">CONSÓRCIO EMBRACON</div>
        <div class="input-group">
            <label>Modalidade Estratégica</label>
            <select id="modEmbracon">
                <option value="select">Select Mais (150 meses - 16% adm)</option>
                <option value="convencional">Convencional (180 meses - 18% adm)</option>
                <option value="estendido">Estendido (Mais por Menos - 25% adm)</option>
            </select>
        </div>
        <button class="btn-embracon" onclick="calcEmbracon()">Analisar Ganho Patrimonial</button>
        <div id="resEmbracon"></div>
    </div>
</div>

<script>
    function show(id, btn) {
        document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
    }

    function mask(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2) + '';
        v = v.replace(".", ",");
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = v == '0,00' ? '' : 'R$ ' + v;
    }

    function num(v) { return parseFloat(v.replace('R$ ', '').replace(/\./g, '').replace(',', '.')); }

    function calcBanco() {
        const v = num(document.getElementById('vGeral').value);
        const n = parseInt(document.getElementById('pBanco').value);
        if(!v) return;

        let taxa = 0.095; // 9.5% a.a. média
        let financiado = v * 0.8;
        let mensal = Math.pow(1+taxa, 1/12)-1;
        let p1 = (financiado/n) + (financiado * mensal) + 50; 
        let total = ((p1 + (financiado/n + 50))/2 * n) + (v*0.2);
        
        document.getElementById('resBanco').innerHTML = `
            <div class="res-row"><span>1ª Parcela:</span> <strong>R$ ${p1.toLocaleString('pt-BR',{minimumFractionDigits:2})}</strong></div>
            <div class="res-row"><span>Total em Juros:</span> <span class="destaque-juros">R$ ${(total-v).toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></div>
            <div class="total-box"><small>DESEMBOLSO TOTAL AO BANCO</small><span>R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></div>
        `;
    }

    function calcEmbracon() {
        const v = num(document.getElementById('vGeral').value);
        const mod = document.getElementById('modEmbracon').value;
        if(!v) return;

        let adm, fundo = 0.02, prazo;
        if(mod === 'select') { adm = 0.16; prazo = 150; }
        else if(mod === 'convencional') { adm = 0.18; prazo = 180; }
        else { adm = 0.25; prazo = 240; }

        let totalAdm = v * (adm + fundo);
        let parcela = (v + totalAdm) / prazo;
        let total = v + totalAdm;

        document.getElementById('resEmbracon').innerHTML = `
            <div class="res-row"><span>Parcela Média:</span> <strong>R$ ${parcela.toLocaleString('pt-BR',{minimumFractionDigits:2})}</strong></div>
            <div class="res-row"><span>Taxa Total (${prazo}m):</span> <strong>${(adm*100).toFixed(2)}%</strong></div>
            <div class="res-row"><span>Custo Total Adm:</span> <strong>R$ ${totalAdm.toLocaleString('pt-BR',{minimumFractionDigits:2})}</strong></div>
            <div class="total-box"><small>INVESTIMENTO TOTAL FINAL</small><span>R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></div>
        `;
    }
</script>
</body>
</html>
