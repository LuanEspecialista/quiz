<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luan - Especialista em Crédito</title>
    <style>
        :root { --azul: #005ca9; --vermelho: #e30613; --cinza: #666; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: #333; }
        .container { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 20px; color: var(--azul); margin: 0; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #eee; transition: 0.3s; }
        .tab-btn.active { background: var(--azul); color: white; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-calc { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--azul); color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        .resultado { margin-top: 25px; padding: 20px; border: 1px solid #eee; border-radius: 15px; display: none; background: #fafafa; }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; }
        .res-destaque { color: var(--vermelho); font-weight: bold; }
        .total-box { background: #333; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-top: 15px; }
        .total-box span { display: block; font-size: 22px; font-weight: 800; color: #ffcc00; }
        .alerta { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Análise de Custo Bancário</h1>
        <p>Simulador de Financiamento (SAC/PRICE)</p>
    </div>

    <div class="tabs">
        <button id="tab-imovel" class="tab-btn active" onclick="switchTab('imovel')">🏠 Imóvel</button>
        <button id="tab-veiculo" class="tab-btn" onclick="switchTab('veiculo')">🚗 Veículo</button>
    </div>

    <div id="alerta-entrada" class="alerta"></div>

    <div class="input-group">
        <label id="lbl-valor">Valor do Imóvel</label>
        <input type="text" id="valor" placeholder="R$ 0,00" oninput="atualizarValor(this)">
    </div>

    <div class="input-group" id="box-entrada">
        <label id="lbl-entrada">Valor da Entrada (Mín. 20%)</label>
        <input type="text" id="entrada" placeholder="R$ 0,00" oninput="maskMoney(this)">
    </div>

    <div class="input-group">
        <label>Prazo (Meses)</label>
        <select id="prazo"></select>
    </div>

    <button class="btn-calc" onclick="calcular()">Gerar Relatório de Perda</button>

    <div id="resultado" class="resultado">
        <div id="detalhes"></div>
        <div class="total-box">
            <small>DESEMBOLSO TOTAL AO BANCO</small>
            <span id="total-final">R$ 0,00</span>
        </div>
    </div>
</div>

<script>
    let mode = 'imovel';

    function switchTab(t) {
        mode = t;
        document.getElementById('tab-imovel').classList.toggle('active', t === 'imovel');
        document.getElementById('tab-veiculo').classList.toggle('active', t === 'veiculo');
        document.getElementById('lbl-valor').innerText = t === 'imovel' ? "Valor do Imóvel" : "Valor do Veículo";
        document.getElementById('lbl-entrada').innerText = t === 'imovel' ? "Valor da Entrada (Mín. 20%)" : "Valor da Entrada (Mín. 10%)";
        
        const p = document.getElementById('prazo');
        if(t === 'imovel') {
            p.innerHTML = '<option value="420">420 meses (35 anos)</option><option value="360" selected>360 meses (30 anos)</option>';
        } else {
            p.innerHTML = '<option value="60">60 meses (5 anos)</option><option value="48" selected>48 meses (4 anos)</option>';
        }
        document.getElementById('valor').value = "";
        document.getElementById('entrada').value = "";
        hideRes();
    }

    function maskMoney(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2) + '';
        v = v.replace(".", ",");
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = v == '0,00' ? '' : 'R$ ' + v;
    }

    // NOVA FUNÇÃO: Preenche a porcentagem mínima automaticamente
    function atualizarValor(i) {
        maskMoney(i);
        const vBem = parseV(i.value);
        if (vBem > 0) {
            const perc = mode === 'imovel' ? 0.20 : 0.10; // 20% imóvel, 10% veículo
            const vSugerido = vBem * perc;
            const campoEntrada = document.getElementById('entrada');
            campoEntrada.value = "R$ " + vSugerido.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        }
    }

    function parseV(v) { return parseFloat(v.replace('R$ ', '').replace(/\./g, '').replace(',', '.')) || 0; }
    function hideRes() { document.getElementById('resultado').style.display = 'none'; document.getElementById('alerta-entrada').style.display = 'none'; }

    function calcular() {
        const vBem = parseV(document.getElementById('valor').value);
        const vEntrada = parseV(document.getElementById('entrada').value);
        const n = parseInt(document.getElementById('prazo').value);
        const alerta = document.getElementById('alerta-entrada');

        if(mode === 'imovel' && vEntrada < (vBem * 0.2)) {
            alerta.innerText = "⚠️ Entrada Insuficiente! O banco exige no mínimo 20%.";
            alerta.style.display = 'block';
            return;
        }

        const financiado = vBem - vEntrada;
        let totalFinal = 0;
        let html = "";

        if(mode === 'imovel') {
            const taxaMensal = Math.pow(1 + 0.098, 1/12) - 1;
            const amort = financiado / n;
            const p1 = amort + (financiado * taxaMensal);
            const pLast = amort + (amort * taxaMensal);
            totalFinal = ((p1 + pLast) / 2 * n) + vEntrada;
            html = `<div class="res-item"><span>1ª Parcela:</span> <strong>R$ ${p1.toLocaleString('pt-BR',{minimumFractionDigits:2})}</strong></div>
                    <div class="res-item"><span>Custo de Juros:</span> <span class="res-destaque">R$ ${(totalFinal-vBem).toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></div>`;
        } else {
            const taxaMensal = 0.018;
            const parcela = financiado * ( (taxaMensal * Math.pow(1+taxaMensal, n)) / (Math.pow(1+taxaMensal, n) - 1) );
            totalFinal = (parcela * n) + vEntrada;
            html = `<div class="res-item"><span>Parcela Fixa:</span> <strong>R$ ${parcela.toLocaleString('pt-BR',{minimumFractionDigits:2})}</strong></div>
                    <div class="res-item"><span>Custo de Juros:</span> <span class="res-destaque">R$ ${(totalFinal-vBem).toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></div>`;
        }

        document.getElementById('detalhes').innerHTML = html;
        document.getElementById('total-final').innerText = "R$ " + totalFinal.toLocaleString('pt-BR', {minimumFractionDigits:2});
        document.getElementById('resultado').style.display = 'block';
        alerta.style.display = 'none';
    }

    switchTab('imovel');
</script>
</body>
</html>
