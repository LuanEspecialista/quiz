<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simuladores Caixa 2026</title>
    <style>
        :root {
            --primaria: #005ca9; /* Azul Caixa */
            --secundaria: #f39200; /* Laranja Caixa */
            --fundo: #f0f2f5;
            --texto: #333;
            --sucesso: #28a745;
            --erro: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fundo);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: #fff;
            width: 100%;
            max-width: 480px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Estilo das Abas */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #e9ecef;
            cursor: pointer;
            font-weight: bold;
            border-radius: 8px;
            color: #666;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primaria);
            color: white;
        }

        .content { display: none; }
        .content.active { display: block; }

        /* Estilo Comum dos Formulários */
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: var(--primaria); margin: 0; font-size: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        input, select {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box;
        }
        button.calc-btn {
            width: 100%; padding: 15px; background: var(--primaria); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
        }

        /* Resultados */
        .resultado {
            margin-top: 20px; padding: 20px; border-radius: 10px; display: none; animation: fadeIn 0.4s;
        }
        .card-ok { border-left: 5px solid var(--sucesso); background: #f0fff4; }
        .card-info { border-left: 5px solid var(--primaria); background: #f8fbff; }
        .card-erro { border-left: 5px solid var(--erro); background: #fff5f5; }
        
        .res-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .destaque { font-size: 22px; color: var(--primaria); font-weight: bold; display: block; text-align: center; margin: 10px 0; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .footer { font-size: 11px; color: #999; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab-imovel')">🏠 Imóvel</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-veiculo')">🚗 Veículo</button>
    </div>

    <div id="tab-imovel" class="content active">
        <div class="header">
            <h2>Simulador Habitacional</h2>
            <p style="font-size: 12px; color: #666;">Sistema SAC - Financia até 80%</p>
        </div>
        <div class="input-group">
            <label>Valor do Imóvel</label>
            <input type="text" id="vImovel" placeholder="R$ 0,00" oninput="mascara(this)">
        </div>
        <div class="input-group">
            <label>Renda Mensal Bruta</label>
            <input type="text" id="vRenda" placeholder="R$ 0,00" oninput="mascara(this)">
        </div>
        <div class="input-group">
            <label>Prazo</label>
            <select id="pImovel">
                <option value="420">420 meses (35 anos)</option>
                <option value="360" selected>360 meses (30 anos)</option>
                <option value="240">240 meses (20 anos)</option>
                <option value="120">120 meses (10 anos)</option>
            </select>
        </div>
        <button class="calc-btn" onclick="calcImovel()">Simular Financiamento</button>
        <div id="resImovel" class="resultado"></div>
    </div>

    <div id="tab-veiculo" class="content">
        <div class="header">
            <h2>Crédito Auto Caixa</h2>
            <p style="font-size: 12px; color: #666;">Tabela PRICE - Parcelas Fixas</p>
        </div>
        <div class="input-group">
            <label>Valor do Veículo</label>
            <input type="text" id="vAuto" placeholder="R$ 0,00" oninput="mascara(this)">
        </div>
        <div class="input-group">
            <label>Valor da Entrada</label>
            <input type="text" id="vEntrada" placeholder="R$ 0,00" oninput="mascara(this)">
        </div>
        <div class="input-group">
            <label>Prazo</label>
            <select id="pAuto">
                <option value="60">60 meses (5 anos)</option>
                <option value="48" selected>48 meses (4 anos)</option>
                <option value="36">36 meses (3 anos)</option>
                <option value="24">24 meses (2 anos)</option>
            </select>
        </div>
        <button class="calc-btn" onclick="calcAuto()">Simular Financiamento</button>
        <div id="resAuto" class="resultado"></div>
    </div>

    <p class="footer">Simulação baseada em taxas estimadas para 2026. <br> Sujeito a aprovação de crédito bancário.</p>
</div>

<script>
    // Navegação de Abas
    function openTab(evt, tabName) {
        let contents = document.getElementsByClassName("content");
        for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
        let buttons = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < buttons.length; i++) buttons[i].classList.remove("active");
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // Máscara Moeda
    function mascara(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2) + '';
        v = v.replace(".", ",");
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = v == '0,00' ? '' : 'R$ ' + v;
    }

    function limpar(v) { return parseFloat(v.replace('R$ ', '').replace(/\./g, '').replace(',', '.')); }

    // Cálculo Imóvel (SAC)
    function calcImovel() {
        const total = limpar(document.getElementById('vImovel').value);
        const renda = limpar(document.getElementById('vRenda').value);
        const n = parseInt(document.getElementById('pImovel').value);
        const res = document.getElementById('resImovel');

        if (!total || !renda) return alert("Preencha os campos!");

        let taxaAnual = total <= 500000 ? 0.0816 : 0.0980;
        let financiado = total * 0.80;
        let amortizacao = financiado / n;
        let taxaMensal = Math.pow(1 + taxaAnual, 1/12) - 1;
        let primeiraP = amortizacao + (financiado * taxaMensal) + 25 + (total * 0.0006);
        let aprovado = primeiraP <= (renda * 0.30);

        res.style.display = "block";
        res.className = "resultado " + (aprovado ? "card-ok" : "card-erro");
        res.innerHTML = `
            <div class="res-row"><span>Entrada (20%):</span> <strong>R$ ${(total*0.2).toLocaleString('pt-BR')}</strong></div>
            <div class="res-row"><span>1ª Parcela:</span> <strong>R$ ${primeiraP.toLocaleString('pt-BR',{minimumFractionDigits:2})}</strong></div>
            <span class="destaque">${aprovado ? "APROVADO" : "RENDA BAIXA"}</span>
        `;
    }

    // Cálculo Veículo (PRICE)
    function calcAuto() {
        const total = limpar(document.getElementById('vAuto').value);
        const entrada = limpar(document.getElementById('vEntrada').value) || 0;
        const n = parseInt(document.getElementById('pAuto').value);
        const res = document.getElementById('resAuto');

        if (!total) return alert("Informe o valor do veículo!");

        let financiado = total - entrada;
        let taxaMensal = 0.0175; // 1.75% a.m.
        let parcela = financiado * ( (taxaMensal * Math.pow(1 + taxaMensal, n)) / (Math.pow(1 + taxaMensal, n) - 1) );
        parcela += (financiado * 0.03 / n); // Estimativa IOF

        res.style.display = "block";
        res.className = "resultado card-info";
        res.innerHTML = `
            <div class="res-row"><span>Valor Financiado:</span> <strong>R$ ${financiado.toLocaleString('pt-BR')}</strong></div>
            <span style="display:block; text-align:center; font-size:12px; margin-top:10px;">PARCELA FIXA</span>
            <span class="destaque">R$ ${parcela.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
        `;
    }
</script>

</body>
</html>
