<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultoria Patrimonial Luan - Master Pro</title>
    <style>
        :root {
            --primary: #0a0e14; --card-bg: #161b22; --accent: #c5a059;
            --text: #e6edf3; --success: #2ea043; --danger: #f85149;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--primary); color: var(--text); margin: 0; padding: 20px; }
        .wrapper { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        
        .main-panel, .side-panel { background: var(--card-bg); border-radius: 15px; padding: 25px; border: 1px solid #30363d; min-height: 600px; }
        
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; background: #0d1117; padding: 8px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; background: transparent; color: #8b949e; font-weight: bold; text-transform: uppercase; font-size: 12px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: var(--primary); box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3); }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; color: var(--accent); font-weight: bold; margin-bottom: 6px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: white; font-size: 16px; box-sizing: border-box; }

        .btn-action { width: 100%; padding: 18px; background: var(--accent); color: var(--primary); border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        .res-container { margin-top: 25px; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 20px; border-left: 5px solid var(--accent); }
        .res-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #30363d; font-size: 15px; }
        .val-highlight { color: var(--success); font-weight: 800; font-size: 19px; }

        .side-title { color: var(--accent); font-size: 14px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
        .info-card { background: #0d1117; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; line-height: 1.6; }
        .badge { display: inline-block; padding: 3px 8px; background: var(--accent); color: var(--primary); border-radius: 4px; font-size: 10px; font-weight: bold; margin-bottom: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="main-panel">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="setTab('tab-imovel', this)">🏠 Imóvel</button>
            <button class="tab-btn" onclick="setTab('tab-veiculo', this)">🚗 Veículo</button>
            <button class="tab-btn" onclick="setTab('tab-investor', this)">👑 Investidor</button>
        </div>

        <div id="tab-imovel" class="section active">
            <div class="input-group">
                <label>Valor do Imóvel / Crédito</label>
                <input type="text" class="money" id="vI" placeholder="R$ 0,00" oninput="autoE(this, 'eI')">
            </div>
            <div class="input-group">
                <label>Entrada (Mín. 20% Banco)</label>
                <input type="text" class="money" id="eI" placeholder="R$ 0,00">
            </div>
            <div class="input-group">
                <label>Prazo Financiamento</label>
                <select id="pI">
                    <option value="420">420 meses (35 anos)</option>
                    <option value="360" selected>360 meses (30 anos)</option>
                    <option value="240">240 meses (20 anos)</option>
                </select>
            </div>
            <button class="btn-action" onclick="calcI()">Analisar Perda Patrimonial</button>
        </div>

        <div id="tab-veiculo" class="section">
            <div class="input-group">
                <label>Valor do Veículo</label>
                <input type="text" class="money" id="vV" placeholder="R$ 0,00" oninput="autoE(this, 'eV')">
            </div>
            <div class="input-group">
                <label>Entrada (Mín. 20%)</label>
                <input type="text" class="money" id="eV" placeholder="R$ 0,00">
            </div>
            <div class="input-group">
                <label>Prazo</label>
                <select id="pV">
                    <option value="60">60 meses (5 anos)</option>
                    <option value="48">48 meses (4 anos)</option>
                    <option value="36">36 meses (3 anos)</option>
                </select>
            </div>
            <button class="btn-action" onclick="calcV()">Analisar Financiamento Veículo</button>
        </div>

        <div id="tab-investor" class="section">
            <div class="input-group">
                <label>Capital para Investir</label>
                <input type="text" class="money" id="capInv" placeholder="R$ 100.000,00">
            </div>
            <div class="input-group">
                <label>Parcela de Crédito</label>
                <input type="text" class="money" id="parcCred" placeholder="R$ 1.500,00">
            </div>
            <div class="input-group">
                <label>Estratégia de Alocação</label>
                <select id="selAtivo">
                    <option value="0.01|0.225|D+1">CDB / Tesouro (Curto Prazo - IR 22,5%)</option>
                    <option value="0.011|0.15|D+30">CDB (Longo Prazo - IR 15%)</option>
                    <option value="0.009|0|D+2">FIIs (Fundos Imobiliários - Isento)</option>
                    <option value="0.0105|0.15|D+1">Tesouro Selic (Liquidez Diária)</option>
                    <option value="0.0085|0|D+90">LCI / LCA (Isento de IR)</option>
                    <option value="0.012|0|D+2">Ações - Dividendos (Isento)</option>
                    <option value="0.035|0.15|D+0">Cripto Staking (Stablecoins)</option>
                </select>
            </div>
            <button class="btn-action" style="background:#2ea043; color:white;" onclick="calcA()">Simular Alavancagem</button>
        </div>

        <div id="resFinal" class="res-container" style="display:none;"></div>
    </div>

    <div class="side-panel">
        <div class="side-title">ANÁLISE ESTRATÉGICA</div>
        <div id="sideContent">
            <div class="info-card">
                <span class="badge">DICA DO CONSULTOR</span><br>
                Utilize os dados ao lado para mostrar ao cliente o <strong>Custo de Oportunidade</strong>. No banco, o dinheiro morre. Aqui, o patrimônio se multiplica.
            </div>
        </div>
        <div id="impactBox" style="margin-top:20px; padding:15px; border-radius:10px; text-align:center; font-weight:bold; display:none;"></div>
    </div>
</div>

<script>
    function setTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        document.getElementById('resFinal').style.display = 'none';
        document.getElementById('impactBox').style.display = 'none';
    }

    function formatBRL(v) {
        return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function mask(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2) + '';
        v = v.replace(".", ",").replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,").replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = v == '0,00' ? '' : 'R$ ' + v;
    }

    document.querySelectorAll('.money').forEach(el => el.addEventListener('input', () => mask(el)));

    function parse(v) { return parseFloat(v.replace('R$ ', '').replace(/\./g, '').replace(',', '.')) || 0; }

    function autoE(i, target) {
        const v = parse(i.value);
        if(v > 0) {
            const entrada = v * 0.20;
            document.getElementById(target).value = formatBRL(entrada);
        }
    }

    function calcI() {
        const v = parse(document.getElementById('vI').value);
        const e = parse(document.getElementById('eI').value);
        const n = parseInt(document.getElementById('pI').value);
        const fin = v - e;
        const tx = 0.0087; 
        const p1 = (fin / n) + (fin * tx);
        const pL = (fin / n) + ((fin/n) * tx);
        const juros = (((p1 + pL)/2)*n) - fin;

        showRes(`
            <div class="res-row"><span>1ª Parcela (SAC):</span><strong>${formatBRL(p1)}</strong></div>
            <div class="res-row"><span>Última Parcela:</span><strong>${formatBRL(pL)}</strong></div>
            <div class="res-row" style="color:var(--danger)"><span>Custo Total de Juros:</span><strong>${formatBRL(juros)}</strong></div>
            <div class="res-row" style="border:none"><span>Total Pago ao Banco:</span><strong class="val-highlight">${formatBRL(juros+v)}</strong></div>
        `);
        showImpact(`O cliente queima ${formatBRL(juros)} em juros bancários!`, 'var(--danger)');
    }

    function calcV() {
        const v = parse(document.getElementById('vV').value);
        const e = parse(document.getElementById('eV').value);
        const n = parseInt(document.getElementById('pV').value);
        const fin = v - e;
        const tx = 0.0199;
        const parc = fin * (tx * Math.pow(1+tx, n)) / (Math.pow(1+tx, n) - 1);
        const juros = (parc * n) - fin;

        showRes(`
            <div class="res-row"><span>Parcela Fixa (PRICE):</span><strong>${formatBRL(parc)}</strong></div>
            <div class="res-row" style="color:var(--danger)"><span>Custo Total de Juros:</span><strong>${formatBRL(juros)}</strong></div>
            <div class="res-row" style="border:none"><span>Desembolso Final:</span><strong class="val-highlight">${formatBRL(parc*n+e)}</strong></div>
        `);
        showImpact(`No banco, o cliente paga quase 2 carros!`, 'var(--danger)');
    }

    function calcA() {
        const cap = parse(document.getElementById('capInv').value);
        const parc = parse(document.getElementById('parcCred').value);
        const [tx, ir, liq] = document.getElementById('selAtivo').value.split('|');

        const rb = cap * parseFloat(tx);
        const vir = rb * parseFloat(ir);
        const rl = rb - vir;
        const cr = parc - rl;

        showRes(`
            <div class="res-row"><span>Rendimento Mensal Líquido:</span><strong class="val-highlight">${formatBRL(rl)}</strong></div>
            <div class="res-row"><span>Parcela de Crédito:</span><strong>${formatBRL(parc)}</strong></div>
            <div class="res-row" style="border-top:2px solid #30363d; margin-top:10px;"><span>Custo Real p/ Investidor:</span><strong style="font-size:22px; color:var(--accent)">${formatBRL(cr < 0 ? 0 : cr)}</strong></div>
        `);
        showImpact(`O dinheiro trabalhando paga ${((rl/parc)*100).toFixed(1)}% da parcela!`, 'var(--success)');
    }

    function showRes(html) {
        const r = document.getElementById('resFinal');
        r.innerHTML = html; r.style.display = 'block';
    }

    function showImpact(txt, color) {
        const i = document.getElementById('impactBox');
        i.innerText = txt; i.style.background = color + '22'; i.style.color = color; i.style.display = 'block';
    }
</script>
</body>
</html>
