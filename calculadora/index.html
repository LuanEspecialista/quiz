<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luan - Especialista em Crédito</title>
    <style>
        :root { --azul-banco: #005ca9; --vermelho: #e30613; --texto: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; color: var(--texto); }
        .container { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 22px; color: var(--azul-banco); margin: 0; }
        .header p { font-size: 14px; color: #666; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #eee; transition: 0.3s; }
        .tab-btn.active { background: var(--azul-banco); color: white; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }

        .btn-calc { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--azul-banco); color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-calc:hover { background: #004a87; }

        .resultado { margin-top: 25px; padding: 20px; border-radius: 12px; display: none; border: 1px solid #eee; }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px; }
        .res-destaque { color: var(--vermelho); font-weight: bold; font-size: 18px; }
        .total-banco { background: #fdf2f2; border: 1px solid #fabfbf; padding: 15px; border-radius: 10px; text-align: center; margin-top: 15px; }
        .total-banco span { display: block; font-size: 24px; font-weight: 800; color: var(--vermelho); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Análise de Custo Bancário</h1>
        <p>Quanto custa de verdade o seu financiamento?</p>
    </div>

    <div class="tabs">
        <button id="btn-imovel" class="tab-btn active" onclick="setTab('imovel')">🏠 Imóvel (SAC)</button>
        <button id="btn-veiculo" class="tab-btn" onclick="setTab('veiculo')">🚗 Veículo (PRICE)</button>
    </div>

    <div id="form-calculadora">
        <div class="input-group">
            <label id="lbl-valor">Valor do Imóvel</label>
            <input type="text" id="valor" placeholder="R$ 0,00" oninput="mascararMoeda(this)">
        </div>

        <div class="input-group" id="group-entrada">
            <label>Valor da Entrada (Mín. 20%)</label>
            <input type="text" id="entrada" placeholder="R$ 0,00" oninput="mascararMoeda(this)">
        </div>

        <div class="input-group">
            <label>Prazo de Pagamento</label>
            <select id="prazo">
                </select>
        </div>

        <button class="btn-calc" onclick="calcular()">Gerar Relatório de Perda</button>
    </div>

    <div id="resultado" class="resultado">
        <div class="header-card" style="text-align: center; font-weight: bold; margin-bottom: 15px;">RELATÓRIO DE FINANCIAMENTO</div>
        <div id="res-content"></div>
        <div class="total-banco">
            <small>DESEMBOLSO TOTAL AO BANCO</small>
            <span id="total-final">R$ 0,00</span>
        </div>
        <p style="font-size: 12px; text-align: center; margin-top: 15px; color: #666;">
            *Simulação baseada em taxas médias de mercado para 2026.
        </p>
    </div>
</div>

<script>
    let abaAtual = 'imovel';

    function setTab(tipo) {
        abaAtual = tipo;
        document.getElementById('btn-imovel').classList.toggle('active', tipo === 'imovel');
        document.getElementById('btn-veiculo').classList.toggle('active', tipo === 'veiculo');
        
        const lblValor = document.getElementById('lbl-valor');
        const selectPrazo = document.getElementById('prazo');
        const groupEntrada = document.getElementById('group-entrada');

        if (tipo === 'imovel') {
            lblValor.innerText = "Valor do Imóvel";
            groupEntrada.style.display = "block";
            selectPrazo.innerHTML = `
                <option value="420">420 meses (35 anos)</option>
                <option value="360" selected>360 meses (30 anos)</option>
                <option value="180">180 meses (15 anos)</option>
            `;
        } else {
            lblValor.innerText = "Valor do Veículo";
            groupEntrada.style.display = "none";
            selectPrazo.innerHTML = `
                <option value="60">60 meses (5 anos)</option>
                <option value="48" selected>48 meses (4 anos)</option>
                <option value="36">36 meses (3 anos)</option>
            `;
        }
        document.getElementById('resultado').style.display = 'none';
    }

    function mascararMoeda(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2) + '';
        v = v.replace(".", ",");
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = v == '0,00' ? '' : 'R$ ' + v;
    }

    function parseValor(v) {
        return parseFloat(v.replace('R$ ', '').replace(/\./g, '').replace(',', '.'));
    }

    function calcular() {
        const valorBem = parseValor(document.getElementById('valor').value);
        const prazo = parseInt(document.getElementById('prazo').value);
        if (!valorBem) return alert("Insira o valor do bem");

        let resHTML = "";
        let totalFinal = 0;

        if (abaAtual === 'imovel') {
            // Lógica SAC (Amortização Constante)
            const entrada = parseValor(document.getElementById('entrada').value) || (valorBem * 0.2);
            const financiado = valorBem - entrada;
            const taxaAnual = 0.098; // 9.8% a.a. (Média mercado)
            const taxaMensal = Math.pow(1 + taxaAnual, 1/12) - 1;
            
            const amortizacao = financiado / prazo;
            const primeiraParcela = amortizacao + (financiado * taxaMensal);
            const ultimaParcela = amortizacao + (amortizacao * taxaMensal);
            totalFinal = ((primeiraParcela + ultimaParcela) / 2 * prazo) + entrada;
            const jurosPagos = totalFinal - valorBem;

            resHTML = `
                <div class="res-item"><span>1ª Parcela:</span> <strong>R$ ${primeiraParcela.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong></div>
                <div class="res-item"><span>Última Parcela:</span> <strong>R$ ${ultimaParcela.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong></div>
                <div class="res-item"><span>Custo de Juros:</span> <span class="res-destaque">R$ ${jurosPagos.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span></div>
            `;
        } else {
            // Lógica PRICE (Veículos)
            const taxaAuto = 0.0185; // 1.85% a.m. (Média mercado)
            const parcela = valorBem * ( (taxaAuto * Math.pow(1+taxaAuto, prazo)) / (Math.pow(1+taxaAuto, prazo) - 1) );
            totalFinal = parcela * prazo;
            const jurosPagos = totalFinal - valorBem;

            resHTML = `
                <div class="res-item"><span>Parcela Fixa:</span> <strong>R$ ${parcela.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong></div>
                <div class="res-item"><span>Taxa Estimada:</span> <strong>1,85% a.m.</strong></div>
                <div class="res-item"><span>Custo de Juros:</span> <span class="res-destaque">R$ ${jurosPagos.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span></div>
            `;
        }

        document.getElementById('res-content').innerHTML = resHTML;
        document.getElementById('total-final').innerText = `R$ ${totalFinal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        document.getElementById('resultado').style.display = 'block';
    }

    // Inicializa a aba de imóvel
    setTab('imovel');
</script>

</body>
</html>
