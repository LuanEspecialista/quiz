<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Concorrência - Bancário 2026</title>
    <style>
        :root {
            --caixa-azul: #005ca9;
            --fundo: #f0f2f5;
            --texto: #333;
            --perigo: #d9534f;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fundo); padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; width: 100%; max-width: 480px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #e9ecef; cursor: pointer; font-weight: bold; border-radius: 8px; color: #666; }
        .tab-btn.active { background: var(--caixa-azul); color: white; }

        .content { display: none; }
        .content.active { display: block; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }

        button.main-btn { width: 100%; padding: 15px; background: var(--caixa-azul); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Estilo do Extrato Financeiro */
        .resultado { margin-top: 20px; padding: 20px; border-radius: 10px; display: none; border: 1px solid #ddd; background: #fdfdfd; }
        .res-header { text-align: center; font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; margin-bottom: 15px; color: #666; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .res-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; border-bottom: 1px dotted #eee; }
        .res-row strong { color: #000; }
        .highlight-juros { color: var(--perigo); font-weight: bold; }
        
        .parcela-box { text-align: center; margin: 20px 0; padding: 15px; background: #f8fbff; border-radius: 8px; border: 1px solid var(--caixa-azul); }
        .parcela-box small { font-size: 11px; color: var(--caixa-azul); font-weight: bold; }
        .parcela-box span { display: block; font-size: 26px; font-weight: bold; color: var(--caixa-azul); }

        .total-pago { background: #333; color: #fff; padding: 10px; border-radius: 5px; text-align: center; margin-top: 15px; }
        .total-pago span { display: block; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab-imovel')">🏠 Imóvel (SAC)</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-veiculo')">🚗 Veículo (PRICE)</button>
    </div>

    <div id="tab-imovel" class="content active">
        <div class="input-group">
            <label>Valor do Imóvel</label>
            <input type="text" id="vImovel" placeholder="R$ 0,00" oninput="mascara(this)">
        </div>
        <div class="input-group">
            <label>Prazo (Meses)</label>
            <select id="pImovel">
                <option value="420">420 meses (35 anos)</option>
                <option value="360" selected>360 meses (30 anos)</option>
                <option value="240">240 meses (20 anos)</option>
                <option value="180">180 meses (15 anos)</option>
            </select>
        </div>
        <button class="main-btn" onclick="calcImovel()">Simular Custo Bancário</button>
        <div id="resImovel" class="resultado"></div>
    </div>

    <div id="tab-veiculo" class="content">
        <div class="input-group">
            <label>Valor do Veículo</label>
            <input type="text" id="vAuto" placeholder="R$ 0,00" oninput="mascara(this)">
        </div>
        <div class="input-group">
            <label>Valor da Entrada (Bancos exigem média 20%)</label>
            <input type="text" id="vEntrada" placeholder="R$ 0,00" oninput="mascara(this)">
        </div>
        <div class="input-group">
            <label>Prazo (Meses)</label>
            <select id="pAuto">
                <option value="60">60 meses</option>
                <option value="48" selected>48 meses</option>
                <option value="36">36 meses</option>
                <option value="24">24 meses</option>
            </select>
        </div>
        <button class="main-btn" onclick="calcAuto()">Simular Custo Bancário</button>
        <div id="resAuto" class="resultado"></div>
    </div>

    <p style="font-size: 10px; color: #999; text-align: center; margin-top: 20px;">
        Ferramenta de análise de mercado - Referência Bancária 2026.
    </p>
</div>

<script>
    function openTab(evt, tabName) {
        let contents = document.getElementsByClassName("content");
        for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
        let buttons = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < buttons.length; i++) buttons[i].classList.remove("active");
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function mascara(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2) + '';
        v = v.replace(".", ",");
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = v == '0,00' ? '' : 'R$ ' + v;
    }

    function limpar(v) { return parseFloat(v.replace('R$ ', '').replace(/\./g, '').replace(',', '.')); }

    function calcImovel() {
        const total = limpar(document.getElementById('vImovel').value);
        const n = parseInt(document.getElementById('pImovel').value);
        const res = document.getElementById('resImovel');
        if (!total) return;

        let taxaAnual = total <= 500000 ? 0.0816 : 0.0980;
        let financiado = total * 0.80;
        let amortizacao = financiado / n;
        let taxaMensal = Math.pow(1 + taxaAnual, 1/12) - 1;
        let primeiraP = amortizacao + (financiado * taxaMensal) + 25 + (total * 0.0006);
        
        // Estimativa do total pago no SAC (Aprox)
        let totalPago = ( (primeiraP + (amortizacao + 25 + (total*0.0003))) / 2 ) * n + (total * 0.20);
        let jurosEtaxas = totalPago - total;

        res.style.display = "block";
        res.innerHTML = `
            <div class="res-header">Diagnóstico de Financiamento</div>
            <div class="res-row"><span>Valor do Bem:</span> <strong>R$ ${total.toLocaleString('pt-BR')}</strong></div>
            <div class="res-row"><span>Financiado (80%):</span> <strong>R$ ${financiado.toLocaleString('pt-BR')}</strong></div>
            <div class="res-row"><span>Taxa de Juros:</span> <strong>${(taxaAnual*100).toFixed(2)}% a.a.</strong></div>
            <div class="res-row"><span>Total em Juros/Taxas:</span> <strong class="highlight-juros">R$ ${jurosEtaxas.toLocaleString('pt-BR', {minimumFractionDigits:2})}</strong></div>
            
            <div class="parcela-box">
                <small>1ª PARCELA ESTIMADA (SAC)</small>
                <span>R$ ${primeiraP.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})}</span>
            </div>

            <div class="total-pago">
                <small>DESEMBOLSO TOTAL FINAL</small>
                <span>R$ ${totalPago.toLocaleString('pt-BR', {minimumFractionDigits:2})}</span>
            </div>
        `;
    }

    function calcAuto() {
        const total = limpar(document.getElementById('vAuto').value);
        const entrada = limpar(document.getElementById('vEntrada').value) || 0;
        const n = parseInt(document.getElementById('pAuto').value);
        const res = document.getElementById('resAuto');
        if (!total) return;

        let financiado = total - entrada;
        let taxaMensal = 0.0175;
        let parcela = financiado * ( (taxaMensal * Math.pow(1 + taxaMensal, n)) / (Math.pow(1 + taxaMensal, n) - 1) );
        parcela += (financiado * 0.03 / n); // IOF

        let totalPagoFinal = (parcela * n) + entrada;
        let custoJuros = totalPagoFinal - total;

        res.style.display = "block";
        res.innerHTML = `
            <div class="res-header">Diagnóstico de Crédito Auto</div>
            <div class="res-row"><span>Valor do Veículo:</span> <strong>R$ ${total.toLocaleString('pt-BR')}</strong></div>
            <div class="res-row"><span>Total em Juros/Taxas:</span> <strong class="highlight-juros">R$ ${custoJuros.toLocaleString('pt-BR', {minimumFractionDigits:2})}</strong></div>
            
            <div class="parcela-box">
                <small>VALOR DA PARCELA FIXA</small>
                <span>R$ ${parcela.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})}</span>
            </div>

            <div class="total-pago">
                <small>DESEMBOLSO TOTAL FINAL</small>
                <span>R$ ${totalPagoFinal.toLocaleString('pt-BR', {minimumFractionDigits:2})}</span>
            </div>
            <p style="font-size:11px; color:#d9534f; text-align:center; margin-top:10px;"><strong>Atenção:</strong> O cliente paga o equivalente a ${(totalPagoFinal/total).toFixed(1)}x o valor do bem.</p>
        `;
    }
</script>
</body>
</html>
