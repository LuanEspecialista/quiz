<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#050505;
  color:white;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

.hero{
  min-height:100vh;
  background:
    linear-gradient(to bottom,rgba(0,0,0,.64),rgba(0,0,0,.82)),
    url('./imagens/hero-bg.webp');
  background-size:cover;
  background-position:center;
  padding:18px 24px 24px;
}

.container{
  width:100%;
  max-width:1240px;
  margin:auto;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:28px;
}

.logo{width:54px}

.top-btn{
  border:1px solid rgba(255,215,120,.35);
  padding:10px 22px;
  border-radius:999px;
  text-decoration:none;
  color:#f3d28a;
  font-size:13px;
  background:rgba(255,255,255,.04);
}

.hero-content{
  text-align:center;
  max-width:850px;
  margin:auto;
}

h1{
  font-family:'Cormorant Garamond',serif;
  font-size:62px;
  font-weight:500;
  line-height:.9;
  margin-bottom:12px;
  letter-spacing:1px;
}

.gold{color:#d7ab63}

.subtitle{
  font-size:16px;
  color:rgba(255,255,255,.82);
  margin-bottom:10px;
}

.description{
  font-size:13px;
  color:rgba(255,255,255,.68);
  margin-bottom:22px;
}

.flags{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:36px;
}

.flag{
  width:52px;
  height:52px;
  border-radius:15px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  display:flex;
  align-items:center;
  justify-content:center;
}

.flag img{
  width:30px;
  height:30px;
  border-radius:50%;
  object-fit:cover;
}

.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}

.card{
  height:245px;
  border-radius:24px;
  overflow:hidden;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:22px;
  background-size:cover;
  background-position:center;
  isolation:isolate;
}

.card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.92),rgba(0,0,0,.32),rgba(0,0,0,.08));
  z-index:-1;
}

.card-content h2{
  font-family:'Cormorant Garamond',serif;
  font-size:30px;
  line-height:1;
  margin-bottom:10px;
}

.card-content p{
  color:rgba(255,255,255,.76);
  line-height:1.4;
  margin-bottom:16px;
  max-width:300px;
  font-size:13px;
}

.card-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:10px 20px;
  border-radius:999px;
  text-decoration:none;
  color:#f2d18b;
  border:1px solid rgba(255,215,120,.3);
  background:rgba(255,255,255,.04);
  font-size:12px;
}

.estrategias{background-image:url('./imagens/estrategias.webp')}
.mobilidade{background-image:url('./imagens/mobilidade.webp')}
.imoveis{background-image:url('./imagens/imoveis.webp')}

@media(max-width:900px){
  .hero{padding:20px 14px 42px}
  .top{margin-bottom:36px}
  .logo{width:52px}
  .top-btn{display:none}

  h1{font-size:43px}
  .subtitle{font-size:15px}
  .description{font-size:13px;margin-bottom:24px}

  .flags{gap:10px;margin-bottom:32px}

  .flag{
    width:52px;
    height:52px;
    border-radius:15px;
  }

  .flag img{
    width:30px;
    height:30px;
  }

  .cards{
    grid-template-columns:1fr;
    gap:16px;
  }

  .card{
    height:250px;
    padding:22px;
    border-radius:22px;
  }

  .card-content h2{font-size:30px}
}

@media(max-width:480px){
  h1{font-size:39px}
  .card{height:235px}
}
</style>
